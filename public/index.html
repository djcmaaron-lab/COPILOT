{id:6,name:"Cierre",sub:"Se conduce, no se pide",timer:"30 seg",mission:"El cierre se CONDUCE, nunca se pide. No preguntes '¿quiere?', di '¿cuándo?'. Agenda la sesión de demostración.",
script:{
receptivo:`<span class="v">— Perfecto [NOMBRE], entonces lo que hacemos es esto, muy sencillo:</span>
<span class="v">— Le agendo una sesión cortita de 15 minutos donde le muestro exactamente cómo quedaría el Pack para su negocio.</span>
<span class="v">— Le enseño su web, el bot funcionando, todo personalizado para [NEGOCIO].</span>
<span class="v">— Es completamente sin compromiso. Si le gusta, avanzamos. Si no, aquí no pasó nada y tan amigos.</span>
<span class="v">— ¿Le queda mejor hoy en la tarde o mañana en la mañana?</span>

<span class="c">👤 "Mañana en la mañana"</span>
<span class="r">→ ¡Perfecto! ¿A las 10 o a las 11? → Listo, [NOMBRE], queda agendado. Le confirmo por WhatsApp ahora mismo. ¿Me da su número para enviarle la confirmación?</span>

<span class="note">TÉCNICA: Alternativa de cierre. NUNCA preguntes "¿quiere agendar?" — eso ya está decidido. Solo preguntas el CUÁNDO: "¿martes o miércoles?", "¿10 o 11?". El cierre se conduce como si fuera lo más natural del mundo.</span>`,
esceptico:`<span class="v">— [NOMBRE], lo que le propongo es lo siguiente:</span>
<span class="v">— Una sesión de diagnóstico de 15 minutos donde le muestro el Pack funcionando con datos de SU negocio.</span>
<span class="v">— Sin costo, sin compromiso, sin presión. Usted ve todo y decide con total libertad.</span>
<span class="v">— ¿Tiene disponibilidad esta semana?</span>

<span class="c">👤 "¿Cuál es el formato?"</span>
<span class="r">→ Videollamada o llamada telefónica, como usted prefiera. Si es videollamada le comparto pantalla con la demo en vivo. 15 minutos exactos, ni un minuto más. ¿Qué formato y qué día le funcionan?</span>

<span class="note">Al escéptico: dale CONTROL. Que elija formato, día y hora. "Sin presión" + "usted decide con total libertad". El control disminuye la resistencia.</span>`,
agresivo:`<span class="v">— [NOMBRE], siguiente paso, muy simple:</span>
<span class="v">— Sesión de 15 minutos. Le muestro el Pack para su negocio.</span>
<span class="v">— Si en 5 minutos no le convence, cortamos ahí.</span>
<span class="v">— ¿Hoy o mañana?</span>

<span class="note">Con agresivo: rápido, sin florituras, dale control del tiempo. "5 minutos y si no le convence, cortamos" es irresistible para el agresivo.</span>`,
analitico:`<span class="v">— [NOMBRE], el siguiente paso lógico sería:</span>
<span class="v">— Sesión personalizada de 15 minutos donde le presento: maqueta de web para su negocio, demo del bot funcionando en vivo, y desglose completo del Pack 199€.</span>
<span class="v">— Son 15 minutos estructurados con agenda clara. ¿Qué día y horario le funciona?</span>

<span class="note">Al analítico: detalla QUÉ recibirá en la sesión. "Maqueta + demo + desglose" = valor tangible que justifica los 15 minutos.</span>`,
indeciso:`<span class="v">— [NOMBRE], mire lo que podemos hacer, muy fácil:</span>
<span class="v">— Le muestro cómo quedaría todo para su negocio en solo 15 minutitos. Es solo ver, sin ningún compromiso.</span>
<span class="v">— Si le gusta, genial, avanzamos. Si no le gusta, no pasa absolutamente nada.</span>
<span class="v">— Le voy a agendar para mañana a las 10. ¿Le parece bien?</span>

<span class="note">Con indeciso: DECIDE por él. "Le voy a agendar mañana a las 10" — NO "¿cuándo le queda?" porque se paraliza. Tú decides, él solo confirma.</span>`
},
subdirs:[
  {label:"Dice sí pero no da fecha",action:"Toma control: 'Perfecto, [NOMBRE], ¿mañana a las 10 le funciona? Le mando confirmación ahora mismo.' Si dice 'puede ser': 'Listo, queda mañana a las 10. Le envío confirmación.' Asúmelo como hecho."},
  {label:"Pide info antes de agendar",action:"Técnica del Y: 'Le mando toda la info por WhatsApp ahora Y agendamos la sesión para verlo juntos. Así tiene la info para revisarla y en la sesión resolvemos dudas. ¿Me da su número?' NO es info O sesión. Es info Y sesión."},
  {label:"'Déjame pensarlo'",action:"'Claro, [NOMBRE]. ¿Qué dato le ayudaría a decidir? Porque seguramente puedo resolverlo ahora.' Si insiste: 'Perfecto, le llamo el jueves. ¿A las 10 o a las 3?' SIEMPRE ancla fecha."}
],
objections:[
  {title:"Mándame info primero",popup:{receptivo:`<div class="section"><div class="section-title">Técnica del Y (no del O)</div><div class="example">"¡Claro que sí, [NOMBRE]! Le mando toda la información ahora mismo. Pero le digo algo: en 15 minutos de sesión le puedo explicar MUCHO mejor que cualquier PDF, porque le muestro todo personalizado para su negocio. Le propongo esto: le mando la info Y agendamos la sesión. Así tiene la info para revisarla, y en la sesión resolvemos cualquier duda. Lo mejor de ambos mundos. ¿Mañana o pasado mañana?"</div></div><div class="proof">"Info O sesión" = pierde la sesión. "Info Y sesión" = gana ambas. SIEMPRE vincula.</div>`,esceptico:`<div class="section"><div class="example">"Con todo gusto. ¿A qué WhatsApp se lo envío? Le incluyo ejemplo de web + demo del bot. Y si después de revisarlo quiere profundizar, agendamos 15 minutos. ¿Le parece una buena forma de evaluarlo?"</div></div>`,agresivo:`<div class="section"><div class="example">"Se la mando ahora. ¿WhatsApp? Pero le anticipo: la info real está en la demo en vivo. ¿La vemos mañana?"</div></div>`,analitico:`<div class="section"><div class="example">"Le preparo un documento con: ejemplo de web del sector, demo del bot, y desglose técnico del Pack. ¿A qué correo? Y para el análisis personalizado, ¿agendamos 15 minutos esta semana?"</div></div>`,indeciso:`<div class="section"><div class="example">"¡Sí, [NOMBRE]! Se la mando ahorita. ¿Me da su WhatsApp? Y le agendo una llamadita cortita para la semana que viene, así si le surgen dudas las resolvemos. ¿El martes a las 10 le queda?"</div></div>`}},
  {title:"Hablar con mi socio/pareja",popup:{receptivo:`<div class="section"><div class="section-title">Técnica: Incluir al tercero</div><div class="example">"¡Perfecto, [NOMBRE]! ¿Y sabe qué sería ideal? Que hagamos la sesión con los dos presentes. Así ambos ven lo mismo, tienen la misma información, y pueden decidir juntos sin teléfono roto. ¿Cuándo pueden ambos?"</div></div><div class="proof">Incluir al socio/pareja en la sesión es MUCHO MEJOR que dejarlo afuera. Evita el "teléfono roto" donde la info se distorsiona.</div>`,esceptico:`<div class="section"><div class="example">"Comprendo, es importante que estén alineados. ¿Le parece si agendamos sesión con ambos? Así la información llega completa y evalúan juntos con los mismos datos."</div></div>`,agresivo:`<div class="section"><div class="example">"Bien. Agenda con tu socio. ¿Cuándo pueden los dos? 15 minutos. Así los dos ven y deciden."</div></div>`,analitico:`<div class="section"><div class="example">"Lógico. ¿Le preparo material para que comparta? Y agendamos sesión conjunta para que ambos evalúen con los mismos datos. ¿Qué día funcionaría?"</div></div>`,indeciso:`<div class="section"><div class="example">"Claro, es importante que estén de acuerdo. ¿Me dice cuándo pueden los dos y lo agendamos? Así se enteran juntos y nadie se queda con dudas."</div></div>`}},
  {title:"No estoy convencido",popup:{receptivo:`<div class="section"><div class="example">"[NOMBRE], lo entiendo completamente. ¿Me permite preguntarle qué parte le genera duda? Porque la sesión de 15 minutos es JUSTAMENTE para eso: que vea todo funcionando, haga todas las preguntas que quiera, y decida con información completa. Si después de verlo sigue sin estar convencido, no perdió más que 15 minutos. Pero si le convence, puede ser un antes y un después para su negocio. ¿No vale la pena 15 minutos para saberlo?"</div></div>`,esceptico:`<div class="section"><div class="example">"Respeto eso. ¿Qué necesitaría ver para estar convencido? ¿Datos? ¿Demo en vivo? ¿Testimonios? Dígame y se lo preparo para una sesión de 15 minutos."</div></div>`,agresivo:`<div class="section"><div class="example">"¿Qué necesita para decidir? Dígame y se lo doy. Porque si es algo que puedo resolver en 15 minutos de demo, vale la pena intentar."</div></div>`,analitico:`<div class="section"><div class="example">"¿Qué variable le falta para completar su evaluación? Puedo preparar datos adicionales, proyecciones específicas, o una demo técnica detallada."</div></div>`,indeciso:`<div class="section"><div class="example">"Es totalmente normal, [NOMBRE]. La sesión de 15 minutos es sin compromiso, justamente para resolver esas dudas. Si después no le convence, no pasa absolutamente nada. ¿Le parece mañana a las 10?"</div></div>`}},
  {title:"No estoy interesado",popup:{receptivo:`<div class="section"><div class="section-title">Última pregunta con salida digna</div><div class="example">"[NOMBRE], lo respeto completamente, y le agradezco su tiempo. Solo una última cosa antes de despedirme: ¿no le interesa porque ya tiene web profesional y bot con IA funcionando, o porque simplemente no es el momento? Porque si ya lo tiene todo resuelto, lo felicito de verdad. Y si es tema de momento, puedo llamarle cuando sea más oportuno."</div></div><div class="proof">Esta pregunta CLASIFICA: si ya tiene todo, es un no real y lo respetas. Si es tema de timing, es oportunidad de follow-up. En ambos casos, sales con dignidad.</div>`,esceptico:`<div class="section"><div class="example">"Entiendo. ¿Me permite preguntarle qué parte no le pareció relevante? Me ayuda a mejorar y se lo agradecería."</div></div>`,agresivo:`<div class="section"><div class="example">"Respetado, [NOMBRE]. ¿Es por el servicio o por el momento? Porque si es momento, le llamo cuando me diga."</div></div>`,analitico:`<div class="section"><div class="example">"Comprendo. ¿El factor determinante fue el precio, el servicio, o el timing? Es información valiosa."</div></div>`,indeciso:`<div class="section"><div class="example">"Claro, sin problema, [NOMBRE]. Y si en algún momento le surge la curiosidad, ¿puedo dejarle mi número? Así me tiene guardado por si acaso."</div></div>`}}
]},

{id:7,name:"Despedida",sub:"Cierre limpio",timer:"< 20 seg",mission:"Corto, seguro, sin reabrir temas. Confirma datos, refuerza la decisión y despide con energía positiva.",hasForm:true,
script:{
receptivo:`<span class="v">— ¡Perfecto [NOMBRE]! Queda confirmado entonces:</span>

subdirs:[
  {label:"No agendó (no interesado)",action:"Cierra con clase: 'Entendido [NOMBRE], le agradezco mucho su tiempo. Si en el futuro le interesa, aquí estamos para usted. Que le vaya muy bien.' NO insistas. La dignidad abre puertas futuras."},
  {label:"Agendó pero duda",action:"Refuerza RÁPIDO: 'Le mando la confirmación ahora mismo. Y recuerde: es solo ver, sin ningún compromiso. Si le gusta, avanzamos, y si no, tan amigos. Nos vemos el [DÍA].' Despide antes de que reconsidere."}
],
objections:[
  {title:"Llámame otro día",popup:{receptivo:`<div class="section"><div class="example">"¡Claro que sí, [NOMBRE]! ¿Qué día y hora le queda mejor? Le llamo puntualísimo. ¿Me da su nombre completo y número para confirmarle?"</div></div><div class="proof">Si deja datos, es oportunidad real. Si no deja datos, era un no educado. SIEMPRE pide datos de contacto.</div>`,esceptico:`<div class="section"><div class="example">"Por supuesto. ¿Qué día y horario prefiere? Le agendo y le confirmo por WhatsApp."</div></div>`,agresivo:`<div class="section"><div class="example">"Dígame día y hora. Le llamo puntual."</div></div>`,analitico:`<div class="section"><div class="example">"Entendido. ¿Me proporciona día, hora y datos de contacto para agendar correctamente?"</div></div>`,indeciso:`<div class="section"><div class="example">"¡Claro! ¿Le parece el jueves a las 10? Le mando recordatorio por WhatsApp. ¿Me da su número?"</div></div>`}},
  {title:"Cambié de opinión",popup:{receptivo:`<div class="section"><div class="example">"Entiendo, [NOMBRE]. ¿Hay algo que lo hizo cambiar de parecer? Porque a veces una duda sin resolver causa eso, y si puedo aclararla, con gusto lo hago."</div></div><div class="warning">Si insiste en que no: "Sin problema, [NOMBRE], que le vaya muy bien. Si en el futuro le interesa, aquí estamos." Cierra con dignidad.</div>`,esceptico:`<div class="section"><div class="example">"Comprendo. ¿Fue algún punto específico? Me ayuda a saber si hay algo que no expliqué bien."</div></div>`,agresivo:`<div class="section"><div class="example">"OK. ¿Es por algo específico? Si no, respeto. Gracias por su tiempo."</div></div>`,analitico:`<div class="section"><div class="example">"¿Fue algún factor que no abordamos? Si hay información pendiente, puedo resolverla ahora."</div></div>`,indeciso:`<div class="section"><div class="example">"Entiendo, [NOMBRE]. No hay ninguna presión. Si en algún momento quiere retomarlo, me escribe y lo vemos con calma. ¿Le dejo mi número?"</div></div>`}},
  {title:"Dame tu contacto",popup:{receptivo:`<div class="section"><div class="example">"¡Claro! Mi número es: [NÚMERO]. Y para poder enviarle la confirmación y que me tenga guardado, ¿me da el suyo?"</div></div><div class="proof">SIEMPRE intercambia. Si solo él tiene tu número, depende de que llame. Si TÚ tienes el suyo, puedes hacer follow-up.</div>`,esceptico:`<div class="section"><div class="example">"Mi número es [NÚMERO]. ¿Me permite enviarle un mensaje para que me tenga registrado?"</div></div>`,agresivo:`<div class="section"><div class="example">"[NÚMERO]. Le mando mensaje ahora. ¿Cuál es su WhatsApp?"</div></div>`,analitico:`<div class="section"><div class="example">"Teléfono: [NÚMERO], correo: [CORREO]. ¿Me proporciona sus datos para enviarle el material?"</div></div>`,indeciso:`<div class="section"><div class="example">"Sí, es [NÚMERO]. Le mando un mensajito ahora para que me tenga guardado. ¿Me da su número?"</div></div>`}},
  {title:"Confirmar datos de cita",popup:{receptivo:`<div class="section"><div class="section-title">Checklist de cierre</div><div class="proof">✅ Nombre completo del contacto<br>✅ Nombre del negocio<br>✅ Número de WhatsApp<br>✅ Día y hora confirmados<br>✅ Formato (videollamada/llamada)<br>✅ Enviar confirmación inmediata</div></div><div class="example">"[NOMBRE], confirmo: [DÍA] a las [HORA] por [FORMATO]. Le mando confirmación ahora mismo. ¡Va a ser una sesión muy productiva, nos vemos!"</div>`,esceptico:`<div class="section"><div class="proof">Misma checklist. Confirma cada dato verbalmente. El escéptico aprecia la precisión.</div></div>`,agresivo:`<div class="section"><div class="proof">Confirma rápido. Máximo 2 frases.</div></div>`,analitico:`<div class="section"><div class="proof">Confirma todos los datos + envía agenda escrita por correo.</div></div>`,indeciso:`<div class="section"><div class="proof">Confirma + refuerza: "Va a ser una sesión muy útil, ya verá."</div></div>`}}
]}
];

let cp=0,am="receptivo",ec=null;

const gm=()=>M.find(m=>m.id===am);

function rMood(){document.getElementById('moodBar').innerHTML=M.map(m=>{const a=m.id===am;return`<button class="mood-btn${a?' active':''}"onclick="setM('${m.id}')"style="background:${a?m.color+'12':''};border-color:${a?m.color+'44':''}"><span class="mood-emoji">${m.emoji}</span>${a?`<span class="mood-label"style="color:${m.color}">${m.label}</span>`:''}</button>`}).join('')}

function rPhase(){const p=P[cp],c=gc();document.getElementById('phaseDots').innerHTML=P.map((_,i)=>{if(i===cp)return`<div class="pdot on"style="background:linear-gradient(90deg,${c},${c}88)"></div>`;if(i<cp)return`<div class="pdot done"style="background:${c}44"></div>`;return`<div class="pdot off"></div>`}).join('');document.getElementById('ptag').textContent=`F${p.id}`;document.getElementById('ptag').style.color=c;document.getElementById('pname').textContent=p.name;document.getElementById('psub').textContent=p.sub;document.getElementById('ptimer').textContent=p.timer;document.getElementById('pmission').textContent=p.mission}

function rCards(){const p=P[cp];document.getElementById('leftCol').innerHTML=p.objections.slice(0,2).map((o,i)=>`<div class="ocard"onclick="openPop(${i})"><div class="tline"></div><span class="otag">Objeción</span><span class="otitle">${o.title}</span><span class="ohint">Toca para ver argumento completo</span></div>`).join('');document.getElementById('rightCol').innerHTML=p.objections.slice(2,4).map((o,i)=>`<div class="ocard"onclick="openPop(${i+2})"><div class="tline"></div><span class="otag">Objeción</span><span class="otitle">${o.title}</span><span class="ohint">Toca para ver argumento completo</span></div>`).join('')}

function rCenter(){const p=P[cp],m=gm();document.getElementById('bmoodText').textContent=`${m.emoji} ${m.label.toUpperCase()}`;let h=`<div class="stxt">${p.script[am]}</div>`;
if(p.hasForm){h+=`<div class="form-area"><div class="form-title">📋 Datos del Cliente</div>${[{k:'nombre',l:'Nombre completo',p:'Ej: Dr. García'},{k:'negocio',l:'Negocio / Clínica',p:'Ej: Clínica Dental Sonríe'},{k:'telefono',l:'Teléfono / WhatsApp',p:'+34 600 123 456'},{k:'horario',l:'Día y hora',p:'Ej: Martes 10am'},{k:'formato',l:'Formato',p:'Videollamada / Llamada'},{k:'notas',l:'Notas',p:'Observaciones...'}].map(f=>`<div class="fgrp"><label>${f.l}</label><input placeholder="${f.p}"id="f_${f.k}"></div>`).join('')}<button class="fbtn"onclick="save()">✓ Confirmar cita</button></div>`}
h+=`<div class="subdirs"><div class="subdirs-title">↳ Redireccionamientos</div>${p.subdirs.map((s,i)=>`<button class="subdir-btn"onclick="openSub(${i})">${s.label}</button>`).join('')}</div>`;
document.getElementById('scriptArea').innerHTML=h}

function rNav(){const p=P[cp],c=gc();document.getElementById('ncur').textContent=p.id;document.getElementById('btnP').disabled=cp===0;const n=document.getElementById('btnN');n.disabled=cp===6;n.style.background=cp===6?'':c+'12';n.style.borderColor=cp===6?'':c+'33';n.style.color=cp===6?'#c5c9d4':c}

function render(){rMood();rPhase();rCards();rCenter();rNav()}
function setM(id){am=id;ec=null;render()}
function go(d){document.getElementById('main').classList.add('hide');ec=null;setTimeout(()=>{cp=Math.max(0,Math.min(6,cp+d));render();document.getElementById('main').classList.remove('hide')},300)}

function openPop(idx){const p=P[cp],o=p.objections[idx],m=gm(),c=gc();document.getElementById('popTag').textContent='Objeción — F'+p.id+' '+p.name;document.getElementById('popTitle').textContent=o.title;document.getElementById('popMood').innerHTML=`Modo: ${m.emoji} ${m.label}`;document.getElementById('popMood').style.color=c;document.getElementById('popBody').innerHTML=o.popup[am];document.getElementById('popover').classList.add('show');document.body.style.overflow='hidden'}
function openSub(idx){const s=P[cp].subdirs[idx],m=gm(),c=gc();document.getElementById('popTag').textContent='Redirección — F'+P[cp].id;document.getElementById('popTitle').textContent=s.label;document.getElementById('popMood').innerHTML=`Modo: ${m.emoji} ${m.label}`;document.getElementById('popMood').style.color=c;document.getElementById('popBody').innerHTML=`<div class="section"><div class="section-title">Qué hacer</div><p>${s.action}</p></div>`;document.getElementById('popover').classList.add('show');document.body.style.overflow='hidden'}
function closePopup(e){if(e&&e.target!==document.getElementById('popover'))return;document.getElementById('popover').classList.remove('show');document.body.style.overflow=''}
function save(){const d={};['nombre','negocio','telefono','horario','formato','notas'].forEach(k=>{const e=document.getElementById('f_'+k);if(e)d[k]=e.value});alert('✅ Cita confirmada:\n'+JSON.stringify(d,null,2))}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup()});
render();
</script>
</body>
</html>
