<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot PSY — Sales Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(170deg,#eef1f7 0%,#fff 40%,#f6f7fc 70%,#faf8f2 100%);min-height:100vh;overflow-x:hidden;color:#1a1a2e}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 28px;background:linear-gradient(180deg,rgba(255,255,255,.97) 70%,rgba(255,255,255,0));backdrop-filter:blur(12px)}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-text{font-weight:800;font-size:13px;letter-spacing:3.5px;color:#b8942e;text-transform:uppercase}
.logo-sep{width:1px;height:16px;background:rgba(184,148,46,.25)}
.logo-sub{font-size:11px;color:#9ca3af;letter-spacing:1.5px;text-transform:uppercase}
.mood-bar{display:flex;gap:4px;align-items:center}
.mood-btn{border:none;border-radius:20px;padding:4px 8px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .3s cubic-bezier(.16,1,.3,1);font-family:inherit;background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.04)}
.mood-btn.active{padding:4px 12px;transform:scale(1.05);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.mood-emoji{font-size:14px;line-height:1}
.mood-label{font-size:10px;font-weight:700;letter-spacing:.5px}

/* PHASE */
.phase-bar{position:fixed;top:52px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;z-index:90;opacity:0;animation:fadeIn .5s ease .2s forwards}
.phase-dots{display:flex;gap:3px}
.pdot{height:3px;border-radius:2px;transition:all .5s cubic-bezier(.16,1,.3,1)}
.pdot.on{width:26px}.pdot.done{width:6px}.pdot.off{width:6px;background:rgba(0,0,0,.07)}
.phase-info{display:flex;align-items:center;gap:8px}
.ptag{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase}
.pname{font-size:15px;font-weight:700;color:#1a1a2e}
.psub{font-size:10px;color:#9ca3af;font-style:italic}
.ptimer{font-size:9px;color:#b0b5c0;letter-spacing:1.5px}
.pmission{font-size:10px;color:#6b7280;margin-top:1px;font-weight:500}

/* LAYOUT */
.main{display:flex;align-items:stretch;gap:14px;width:100%;max-width:1460px;margin:120px auto 80px;padding:0 18px;transition:all .35s cubic-bezier(.16,1,.3,1)}
.main.hide{opacity:0;transform:translateY(14px) scale(.98)}
.side{display:flex;flex-direction:column;gap:12px;flex:1;min-width:0}

/* OBJ CARDS - DEEP BLUE 3D */
.ocard{
  border-radius:18px;padding:22px 18px;cursor:pointer;position:relative;overflow:hidden;
  display:flex;flex-direction:column;transition:all .4s cubic-bezier(.16,1,.3,1);
  background:linear-gradient(155deg,#0062cc,#004ba0 40%,#003580 70%,#004da6);
  border:1px solid rgba(0,120,255,.2);
  box-shadow:0 2px 4px rgba(0,30,80,.12),0 8px 20px rgba(0,40,100,.18),0 18px 40px rgba(0,20,60,.14),inset 0 1px 0 rgba(100,180,255,.18),inset 0 -2px 5px rgba(0,15,50,.25);
  min-height:120px;
}
.ocard:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 4px 8px rgba(0,30,80,.15),0 14px 32px rgba(0,40,100,.22),0 28px 56px rgba(0,20,60,.16),inset 0 1px 0 rgba(100,180,255,.22),inset 0 -2px 6px rgba(0,15,50,.28)}
.ocard .tline{position:absolute;top:0;left:12%;right:12%;height:2px;background:linear-gradient(90deg,transparent,rgba(100,180,255,.2),transparent)}
.otag{font-size:8px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:rgba(150,200,255,.5);margin-bottom:6px}
.otitle{font-size:14px;font-weight:700;color:#fff;line-height:1.35;text-shadow:0 1px 2px rgba(0,20,60,.25)}
.ohint{font-size:9px;color:rgba(150,200,255,.35);margin-top:6px;font-style:italic}

/* CENTER CARD */
.ccard{
  flex:2;min-height:460px;max-height:80vh;border-radius:22px;padding:26px 24px;
  display:flex;flex-direction:column;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#0070e0,#005cc0 25%,#003d8f 50%,#004da6 75%,#0062cc);
  border:1px solid rgba(0,140,255,.28);
  box-shadow:0 4px 8px rgba(0,30,80,.12),0 12px 28px rgba(0,40,100,.18),0 28px 56px rgba(0,20,60,.16),0 48px 96px rgba(0,15,50,.1),inset 0 2px 0 rgba(100,190,255,.22),inset 0 -3px 10px rgba(0,15,50,.3);
}
.ccard .gline{position:absolute;top:0;left:8%;right:8%;height:2.5px;background:linear-gradient(90deg,transparent,#c9a54e55,#c9a54eaa,#c9a54e55,transparent)}
.ccard .ctl{position:absolute;top:12px;right:12px;width:20px;height:20px;border-top:1.5px solid rgba(201,165,78,.4);border-right:1.5px solid rgba(201,165,78,.4);border-radius:0 5px 0 0}
.ccard .cbr{position:absolute;bottom:12px;left:12px;width:20px;height:20px;border-bottom:1.5px solid rgba(201,165,78,.4);border-left:1.5px solid rgba(201,165,78,.4);border-radius:0 0 0 5px}
.ccard::before{content:'';position:absolute;top:-40%;left:-30%;width:160%;height:160%;background:radial-gradient(ellipse at 25% 15%,rgba(0,140,255,.12),transparent 55%);pointer-events:none}
.badges{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:relative;z-index:1}
.bscript{padding:4px 12px;border-radius:9px;font-size:8px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;background:rgba(201,165,78,.18);border:1px solid rgba(201,165,78,.35);color:#e8c85a}
.bmood{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.12);border:1px solid rgba(100,180,255,.12);border-radius:9px;padding:4px 10px}
.bmood-text{font-size:8px;color:#e8c85a;font-weight:700;letter-spacing:1.5px}
.script-area{flex:1;overflow-y:auto;padding-right:4px;position:relative;z-index:1}
.script-area::-webkit-scrollbar{width:3px}
.script-area::-webkit-scrollbar-thumb{background:rgba(100,180,255,.2);border-radius:3px}
.stxt{font-size:13.5px;line-height:1.85;color:rgba(220,235,255,.92);margin-bottom:6px}
.stxt .v{color:#fff;font-weight:600}
.stxt .c{color:#7dd3fc;font-style:italic;display:block;margin:6px 0;padding:6px 10px;background:rgba(0,0,0,.1);border-left:2px solid #7dd3fc;border-radius:0 6px 6px 0;font-weight:500}
.stxt .r{color:#fcd34d;display:block;margin:4px 0 4px 12px;font-weight:500}
.stxt .note{color:rgba(180,210,255,.55);font-size:12px;display:block;margin-top:10px;padding-top:8px;border-top:1px solid rgba(100,180,255,.1);font-style:italic}

/* SUB-DIRECTIONS */
.subdirs{margin-top:14px;padding-top:12px;border-top:1px solid rgba(100,180,255,.12);position:relative;z-index:1}
.subdirs-title{font-size:8px;font-weight:800;letter-spacing:2px;color:rgba(201,165,78,.7);text-transform:uppercase;margin-bottom:8px}
.subdir-btn{
  display:inline-block;margin:3px 4px 3px 0;padding:7px 14px;border-radius:10px;
  background:rgba(0,0,0,.15);border:1px solid rgba(100,180,255,.15);
  color:rgba(200,225,255,.85);font-size:11px;font-weight:600;cursor:pointer;
  transition:all .25s;font-family:inherit;
}
.subdir-btn:hover{background:rgba(0,0,0,.25);border-color:rgba(100,180,255,.3);transform:translateY(-1px)}

/* FORM */
.form-area{margin-top:14px;padding:16px;border-radius:14px;background:rgba(0,0,0,.12);border:1px solid rgba(201,165,78,.2)}
.form-title{font-size:9px;font-weight:800;letter-spacing:2px;color:#e8c85a;text-transform:uppercase;margin-bottom:10px}
.fgrp{margin-bottom:8px}
.fgrp label{font-size:9px;color:rgba(180,210,255,.6);font-weight:600;display:block;margin-bottom:3px}
.fgrp input{width:100%;background:rgba(0,0,0,.2);border:1px solid rgba(201,165,78,.15);border-radius:8px;padding:8px 12px;color:#fff;font-size:12px;outline:none;font-family:inherit;transition:border .2s,box-shadow .2s}
.fgrp input:focus{border-color:rgba(201,165,78,.4);box-shadow:0 0 16px rgba(201,165,78,.1)}
.fgrp input::placeholder{color:rgba(150,190,240,.35)}
.fbtn{width:100%;margin-top:8px;border:none;border-radius:10px;padding:11px;background:linear-gradient(135deg,#c9a54e,#a8862e);color:#fff;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:inherit;box-shadow:0 4px 18px rgba(184,148,46,.3)}
.fbtn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(184,148,46,.4)}

/* NAV */
.nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;z-index:100;background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-radius:18px;padding:7px 14px;border:1px solid rgba(0,80,180,.1);box-shadow:0 6px 28px rgba(0,30,80,.08)}
.nbtn{border-radius:10px;padding:8px 16px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.5px;font-family:inherit;transition:all .25s;border:1px solid rgba(0,80,180,.1);background:rgba(0,80,180,.04);color:#1e3a5f}
.nbtn:disabled{cursor:not-allowed;color:#d1d5db;background:transparent;border-color:rgba(0,0,0,.02)}
.nbtn.nx{font-weight:800}
.ncnt{display:flex;align-items:center;gap:3px;padding:0 6px}
.ncur{font-size:13px;font-weight:800;color:#c9a54e}
.ntot{font-size:10px;color:#c5c9d4}

/* POPUP OVERLAY */
.popup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,15,40,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.popup-overlay.show{display:flex}
.popup{
  width:100%;max-width:680px;max-height:80vh;overflow-y:auto;
  border-radius:22px;padding:32px 28px;position:relative;
  background:linear-gradient(160deg,#0070e0,#004da6 40%,#003580 70%,#0058c0);
  border:1px solid rgba(0,140,255,.3);
  box-shadow:0 20px 60px rgba(0,20,60,.4),0 40px 100px rgba(0,10,40,.3),inset 0 1px 0 rgba(100,190,255,.2);
  animation:popIn .3s cubic-bezier(.16,1,.3,1);
}
.popup::-webkit-scrollbar{width:3px}
.popup::-webkit-scrollbar-thumb{background:rgba(100,180,255,.2);border-radius:3px}
.popup-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
.popup-close:hover{background:rgba(0,0,0,.35);transform:scale(1.1)}
.popup-tag{font-size:8px;font-weight:800;letter-spacing:2.5px;color:rgba(150,200,255,.5);text-transform:uppercase;margin-bottom:4px}
.popup-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px;text-shadow:0 1px 3px rgba(0,20,60,.3)}
.popup-mood{font-size:10px;color:#e8c85a;font-weight:700;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.popup-mood::before{content:'';width:4px;height:4px;border-radius:50%;background:#e8c85a}
.popup-body{font-size:14px;line-height:1.85;color:rgba(220,235,255,.9)}
.popup-body .section{margin-bottom:16px}
.popup-body .section-title{font-size:11px;font-weight:800;letter-spacing:1.5px;color:#7dd3fc;text-transform:uppercase;margin-bottom:6px}
.popup-body .example{padding:10px 14px;background:rgba(0,0,0,.12);border-left:2px solid #fcd34d;border-radius:0 8px 8px 0;margin:8px 0;color:#fcd34d;font-weight:500;font-size:13px}
.popup-body .proof{padding:10px 14px;background:rgba(34,197,94,.08);border-left:2px solid #22c55e;border-radius:0 8px 8px 0;margin:8px 0;color:#86efac;font-size:13px}
.popup-body .warning{padding:8px 14px;background:rgba(239,68,68,.08);border-left:2px solid #ef4444;border-radius:0 8px 8px 0;margin:8px 0;color:#fca5a5;font-size:12px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <div class="logo-area"><span class="logo-text">Copilot PSY</span><div class="logo-sep"></div><span class="logo-sub">Sales Hub</span></div>
  <div class="mood-bar" id="moodBar"></div>
</div>
<div class="phase-bar" id="phaseBar">
  <div class="phase-dots" id="phaseDots"></div>
  <div class="phase-info"><span class="ptag" id="ptag"></span><span class="pname" id="pname"></span><span class="psub" id="psub"></span></div>
  <span class="ptimer" id="ptimer"></span>
  <span class="pmission" id="pmission"></span>
</div>
<div class="main" id="main">
  <div class="side" id="leftCol"></div>
  <div class="ccard" id="ccard">
    <div class="gline"></div><div class="ctl"></div><div class="cbr"></div>
    <div class="badges"><span class="bscript">Guión Activo</span><div class="bmood"><span class="bmood-text" id="bmoodText"></span></div></div>
    <div class="script-area" id="scriptArea"></div>
  </div>
  <div class="side" id="rightCol"></div>
</div>
<div class="nav">
  <button class="nbtn" id="btnP" onclick="go(-1)">← Anterior</button>
  <div class="ncnt"><span class="ncur" id="ncur"></span><span class="ntot">/7</span></div>
  <button class="nbtn nx" id="btnN" onclick="go(1)">Siguiente →</button>
</div>
<div class="popup-overlay" id="popover" onclick="closePopup(event)">
  <div class="popup" id="popup" onclick="event.stopPropagation()">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-tag" id="popTag"></div>
    <div class="popup-title" id="popTitle"></div>
    <div class="popup-mood" id="popMood"></div>
    <div class="popup-body" id="popBody"></div>
  </div>
</div>

<script>
const M=[
  {id:"receptivo",label:"Receptivo",color:"#22c55e",emoji:"😊"},
  {id:"esceptico",label:"Escéptico",color:"#f59e0b",emoji:"🤨"},
  {id:"agresivo",label:"Agresivo",color:"#ef4444",emoji:"😤"},
  {id:"analitico",label:"Analítico",color:"#3b82f6",emoji:"🧐"},
  {id:"indeciso",label:"Indeciso",color:"#a855f7",emoji:"😕"}
];

const P=[
// ═══ F1 PRESENTACIÓN ═══
{id:1,name:"Presentación",sub:"Filtro al decisor",timer:"< 30 seg",mission:"Llegar al decisor sin revelar el producto. No des info de más.",
script:{
receptivo:`<span class="v">— ¡Hola! ¿Hablo con [NEGOCIO]?</span>
<span class="v">— Soy Aarón de Sykes AI. ¿Estoy hablando con el encargado o dueño?</span>

<span class="c">👤 "Sí, soy yo" / "Sí, ¿qué necesita?"</span>
<span class="r">→ ¡Perfecto! Mire, le llamo porque estamos trabajando con negocios como el suyo en [ZONA] y quería hacerle una consulta rápida, ¿me regala 2 minutos?</span>

<span class="c">👤 "No, no está" / "¿De parte de quién?"</span>
<span class="r">→ Entiendo, ¿a qué hora lo puedo localizar? Es sobre un tema de gestión del negocio, nada comercial. Solo necesito 2 minutos con él.</span>

<span class="c">👤 "¿De qué se trata?"</span>
<span class="r">→ Estamos haciendo una evaluación con negocios de [RUBRO] en la zona. Solo quiero verificar un dato con el encargado, ¿se encuentra?</span>

<span class="note">Apertura &lt; 20 seg · Confirma nombre del negocio al inicio · No mencionar bot, WhatsApp, ni precio · No explicar el producto</span>`,

esceptico:`<span class="v">— ¡Hola! ¿[NEGOCIO]? Buenas tardes.</span>
<span class="v">— Soy Aarón, de Sykes AI. ¿Con quién tengo el gusto?</span>

<span class="c">👤 "¿Qué necesita?" / "¿Qué vende?"</span>
<span class="r">→ No le voy a vender nada. Estamos haciendo un diagnóstico con negocios de su rubro en [ZONA]. Solo necesito validar un dato con el responsable. ¿Es usted?</span>

<span class="c">👤 "Sí, pero estoy ocupado"</span>
<span class="r">→ Lo entiendo perfectamente. Son 2 minutos exactos. Si ve que no le aporta, cortamos ahí. ¿Me da la oportunidad?</span>

<span class="c">👤 "No, él no está"</span>
<span class="r">→ Perfecto, ¿me puede indicar su nombre y a qué hora lo localizo? Es un tema que le compete directamente.</span>

<span class="note">Con el escéptico, menos es más · No insistas si dice que no, agenda callback · Tono neutro y profesional, nunca entusiasta</span>`,

agresivo:`<span class="v">— ¡Hola! ¿[NEGOCIO]?</span>
<span class="v">— Aarón, del área de consultoría de Sykes. ¿El encargado está disponible?</span>

<span class="c">👤 "¿Qué quiere?" / "No pasamos llamadas"</span>
<span class="r">→ Entiendo. No es una llamada comercial. Estamos cerrando un análisis de negocios en [ZONA] y necesito 90 segundos con quien toma decisiones. ¿Está?</span>

<span class="c">👤 "Soy yo, ¿qué necesita?"</span>
<span class="r">→ Perfecto, seré breve. Le llamo porque detectamos una oportunidad específica para negocios de su tipo. ¿Me permite una pregunta directa?</span>

<span class="c">👤 "No me interesa"</span>
<span class="r">→ Respeto su tiempo. Solo una pregunta: ¿actualmente está satisfecho con cómo llegan sus clientes nuevos? Si la respuesta es sí, no lo molesto más.</span>

<span class="note">Con agresivos: tono firme, cero sumisión · No pidas permiso excesivo · Si dice no, haz UNA pregunta ancla y respeta la respuesta</span>`,

analitico:`<span class="v">— Buenas tardes, ¿me comunico con [NEGOCIO]?</span>
<span class="v">— Mi nombre es Aarón, soy consultor de Sykes AI. ¿Podría hablar con el responsable de la operación?</span>

<span class="c">👤 "¿Cuál es el motivo de su llamada?"</span>
<span class="r">→ Estamos realizando un análisis del sector [RUBRO] en [ZONA]. Queremos contrastar un dato operativo. Son 2 minutos y si no aplica, se lo indico directamente.</span>

<span class="c">👤 "Soy yo, ¿qué dato necesita?"</span>
<span class="r">→ Excelente. Le haré una consulta puntual sobre su proceso de captación actual. ¿Me permite?</span>

<span class="c">👤 "Envíeme un correo"</span>
<span class="r">→ Con gusto, ¿a qué correo se lo envío? Aunque le adelanto que es un tema que se resuelve mejor en 2 minutos por teléfono que por escrito. ¿Preferirá que le llame en otro horario?</span>

<span class="note">El analítico quiere contexto antes de ceder · Sé específico en el motivo · No uses superlativos · Respeta su proceso</span>`,

indeciso:`<span class="v">— ¡Hola! ¿[NEGOCIO]? ¿Cómo está?</span>
<span class="v">— Soy Aarón, de Sykes AI. ¿Me podría comunicar con el dueño o encargado?</span>

<span class="c">👤 "Mmm, ¿para qué sería?"</span>
<span class="r">→ Tranquilo, es algo rápido. Estamos trabajando con negocios como el suyo y quería hacerle una consulta. No toma más de 2 minutos. ¿Es usted el encargado?</span>

<span class="c">👤 "Sí... pero no sé si tenga tiempo"</span>
<span class="r">→ Solo son 2 minutos, de verdad. Si en cualquier momento siente que no es para usted, lo dejamos. ¿Le parece?</span>

<span class="c">👤 "No sé, mejor luego"</span>
<span class="r">→ Claro, ¿le queda mejor mañana por la mañana o por la tarde? Le llamo a la hora exacta que me diga.</span>

<span class="note">El indeciso necesita seguridad · Dale opciones cerradas, nunca abiertas · Guía cada paso · No lo dejes en silencio largo</span>`
},
subdirs:[
  {label:"Gatekeeper no cede",action:"Pregúntale: '¿Cuál es el nombre del encargado y a qué hora está? Le digo que es sobre un análisis que le compete directamente.' Si no da nombre, pregunta si hay horario fijo en que esté presente."},
  {label:"Piden que llames después",action:"Nunca aceptes un 'después' sin fecha. Di: 'Perfecto, ¿le queda mejor mañana a las 10 o a las 3?' Si dice 'cualquier hora', elige tú: 'Le llamo mañana a las 10 en punto.'"},
  {label:"Preguntan precio/producto",action:"NO reveles. Di: 'Antes de hablar de eso necesito validar un dato con el encargado, ¿se encuentra?' Si insisten: 'Es un análisis gratuito del negocio, no una venta.'"}
],
objections:[
  {title:"¿De qué se trata?",popup:{
    receptivo:`<div class="section"><div class="section-title">Estrategia</div>El interlocutor quiere filtrar si vale la pena escucharte. Tu objetivo es generar curiosidad sin revelar el producto. Si dices "WhatsApp" o "bot" aquí, pierdes.</div><div class="section"><div class="section-title">Argumento</div><div class="example">"Estamos haciendo una evaluación con negocios de [RUBRO] en [ZONA]. Hemos encontrado oportunidades que otros negocios están aprovechando y quería verificar si aplica para ustedes. Solo necesito 2 minutos con quien toma las decisiones."</div></div><div class="section"><div class="section-title">Si insiste</div><div class="example">"Es sobre captación de clientes. Pero antes de entrar en detalle necesito validar un par de datos con el encargado. ¿Se encuentra?"</div></div><div class="warning">NUNCA: mencionar WhatsApp, bot, automatización, precio, o cualquier detalle del producto en esta fase.</div>`,
    esceptico:`<div class="section"><div class="section-title">Estrategia</div>El escéptico filtra con desconfianza. Responde con hechos, no con entusiasmo. Sé directo y conciso.</div><div class="section"><div class="section-title">Argumento</div><div class="example">"Es un diagnóstico sin costo que estamos realizando para negocios de su sector. No es una venta. Si no aplica, se lo digo directamente. ¿Usted es el encargado o me puede comunicar?"</div></div><div class="section"><div class="section-title">Si insiste</div><div class="example">"Se trata de evaluar su proceso actual de captación de clientes. Es factual, sin compromiso, y toma 2 minutos."</div></div><div class="warning">No uses palabras como "increíble", "revolucionario" o "oportunidad única". El escéptico las detecta como venta.</div>`,
    agresivo:`<div class="section"><div class="section-title">Estrategia</div>El agresivo quiere que vayas al grano. Responde con firmeza y brevedad. No pidas permiso, da información mínima.</div><div class="section"><div class="section-title">Argumento</div><div class="example">"Es sobre captación de clientes para su negocio. No es comercial. Solo necesito verificar un dato con el responsable. ¿Está disponible?"</div></div><div class="section"><div class="section-title">Si presiona más</div><div class="example">"Mire, no le quiero hacer perder el tiempo ni yo perder el mío. Trabajo con negocios de su tipo y tengo un dato que le interesa. Son 90 segundos. ¿Sí o no?"</div></div><div class="warning">Con el agresivo, la duda es debilidad. Sé directo sin ser confrontativo.</div>`,
    analitico:`<div class="section"><div class="section-title">Estrategia</div>El analítico quiere categorizar tu llamada. Dale contexto suficiente para que no te descarte, pero no tanto que pierda interés.</div><div class="section"><div class="section-title">Argumento</div><div class="example">"Realizamos análisis sectoriales para negocios de [RUBRO]. Específicamente evaluamos el proceso de adquisición de clientes y lo comparamos con benchmarks del sector. Solo necesito contrastar un dato con el responsable."</div></div><div class="section"><div class="section-title">Si pide más detalles</div><div class="example">"Evaluamos tres métricas: fuente de captación, costo por cliente adquirido y tasa de conversión. El análisis toma 2 minutos por teléfono."</div></div><div class="warning">No le digas que es "rápido" — el analítico desconfía de lo superficial. Dile que es "puntual" o "específico".</div>`,
    indeciso:`<div class="section"><div class="section-title">Estrategia</div>El indeciso no sabe si debería escucharte o no. Necesita que tomes la decisión por él dándole seguridad.</div><div class="section"><div class="section-title">Argumento</div><div class="example">"Es algo sencillo, no se preocupe. Estamos trabajando con negocios como el suyo y quería hacerle una pregunta rápida al encargado. Si al final no le sirve, no pasa nada. ¿Es usted o me lo puede comunicar?"</div></div><div class="section"><div class="section-title">Si duda</div><div class="example">"Mire, no le va a quitar tiempo. Es literalmente una pregunta. Si la respuesta no aplica, le agradezco y ya. ¿Le parece?"</div></div><div class="warning">No des opciones abiertas al indeciso. En vez de "¿le queda bien?", di "¿le marco mañana a las 10?"</div>`
  }},
  {title:"No pasan comerciales",popup:{
    receptivo:`<div class="section"><div class="section-title">Estrategia</div>Te clasificaron como vendedor. Necesitas reclasificarte como algo diferente: consultor, analista, evaluador.</div><div class="section"><div class="section-title">Argumento principal</div><div class="example">"Entiendo completamente. Esto no es una llamada comercial. Estamos haciendo un análisis del sector y el dueño de una clínica similar a esta nos pidió que también evaluáramos a ustedes. ¿A qué hora lo puedo localizar?"</div></div><div class="section"><div class="section-title">Técnica: referencia cruzada</div><div class="proof">Menciona que "otro negocio similar" ya participó. Esto crea FOMO y legitimiza tu llamada: "El dueño de [negocio similar] ya tomó el análisis y nos sugirió incluirlos a ustedes."</div></div><div class="section"><div class="section-title">Plan B: agenda callback</div><div class="example">"Sin problema. ¿Me puede dar el nombre del encargado y un horario donde lo pueda localizar? El análisis es gratuito y toma 2 minutos."</div></div><div class="warning">Si el gatekeeper es firme, no pelees. Agradece y llama en otro horario. A veces un turno diferente tiene diferente gatekeeper.</div>`,
    esceptico:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Comprendo. No es una llamada de ventas. Soy consultor y estoy recopilando datos del sector. Solo necesito 2 minutos con el responsable para un dato puntual. Si no aplica, no insisto."</div></div><div class="proof">"Le puedo dar mi nombre completo y empresa para que lo verifique antes si lo prefiere."</div><div class="warning">Al escéptico, ofrece transparencia. Que verifique quién eres.</div>`,
    agresivo:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Entendido. No es comercial. Es un análisis que ya se hizo con negocios similares. Necesito al encargado 90 segundos. ¿Está o no?"</div></div><div class="warning">No te disculpes. No pidas permiso de más. Si dicen no, pregunta horario y cuelga.</div>`,
    analitico:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Comprendo la política. Mi llamada es de carácter consultivo, no comercial. Estamos realizando un benchmarking sectorial y necesito contrastar un dato operativo con el responsable. ¿Cuándo sería el horario más adecuado?"</div></div><div class="proof">Usar la palabra "benchmarking" con el analítico legitima tu llamada como técnica.</div>`,
    indeciso:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Claro, lo entiendo. No es nada de ventas, es una consulta rápida. Solo quería hacerle una pregunta al encargado. ¿Me puede decir a qué hora lo encuentro? Le prometo que es breve."</div></div><div class="warning">Con el indeciso, usa "le prometo que es breve" — necesita sentir seguridad de que no perderá tiempo.</div>`
  }},
  {title:"Ya es el decisor",popup:{
    receptivo:`<div class="section"><div class="section-title">¡Objetivo cumplido!</div>Ya tienes al decisor. Ahora tu misión es hacer UNA pregunta que abra la puerta a F2 (Captar el dolor).</div><div class="section"><div class="section-title">Transición a F2</div><div class="example">"¡Perfecto, [NOMBRE]! Mire, le llamo porque estamos trabajando con negocios como el suyo en [ZONA] y quería preguntarle algo rápido: ¿cómo les llegan hoy los clientes nuevos? ¿Tienen algún sistema para eso o llegan orgánicamente?"</div></div><div class="proof">Esta pregunta es el puente perfecto a F2. Si responde, ya estás dentro.</div>`,
    esceptico:`<div class="section"><div class="section-title">Transición a F2</div><div class="example">"Perfecto. Seré directo: ¿actualmente tienen algún proceso definido para captar clientes nuevos o depende de la recomendación?"</div></div><div class="proof">Con el escéptico, la pregunta debe ser cerrada y profesional. Sin entusiasmo.</div>`,
    agresivo:`<div class="section"><div class="section-title">Transición a F2</div><div class="example">"Bien. Pregunta directa: ¿cómo llegan sus clientes nuevos hoy?"</div></div>`,
    analitico:`<div class="section"><div class="section-title">Transición a F2</div><div class="example">"Excelente. Permítame una consulta puntual: ¿qué canales utiliza actualmente su negocio para la captación de clientes nuevos?"</div></div>`,
    indeciso:`<div class="section"><div class="section-title">Transición a F2</div><div class="example">"Qué bueno que hablo con usted. Mire, solo una cosita rápida: ¿cómo hacen para que les lleguen clientes nuevos al negocio? ¿Les llegan solitos o tienen que buscarlos?"</div></div>`
  }},
  {title:"Espejear el tono",popup:{
    receptivo:`<div class="section"><div class="section-title">Perfil: Cliente abierto y amigable</div>Espejea su energía. Habla con ritmo rápido pero claro. Sonríe (se escucha). Usa lenguaje coloquial: "mira", "te cuento", "fíjate". Trata de tú si él lo hace primero.</div><div class="section"><div class="section-title">Señales que lo identifican</div><div class="proof">Responde rápido · Usa humor · Dice "cuéntame" o "dale" · No pone barreras · Tono relajado</div></div><div class="section"><div class="section-title">Errores a evitar</div><div class="warning">No seas demasiado formal — lo aburres. No leas un guión robótico. Fluye con la conversación.</div></div>`,
    esceptico:`<div class="section"><div class="section-title">Perfil: Cliente cauteloso y desconfiado</div>Baja tu energía un 30%. Sé factual, no emocional. No exageres nada. Cada afirmación debe poder respaldarse. Trata de usted.</div><div class="section"><div class="section-title">Señales</div><div class="proof">Hace muchas preguntas · Duda de lo que dices · Pide pruebas · Tono plano · Silencios largos</div></div><div class="warning">No digas "confíe en mí" ni "le va a encantar". Son red flags para el escéptico.</div>`,
    agresivo:`<div class="section"><div class="section-title">Perfil: Cliente directo y confrontativo</div>NO te achiques. Sé firme sin ser agresivo de vuelta. Respuestas cortas. No justifiques de más. Si te interrumpe, déjalo hablar y retoma con calma.</div><div class="section"><div class="section-title">Señales</div><div class="proof">Interrumpe · Tono alto · "Vaya al grano" · Impaciente · Confronta afirmaciones</div></div><div class="warning">No te disculpes excesivamente. No digas "perdón por molestarlo". Dilo una vez y nunca más.</div>`,
    analitico:`<div class="section"><div class="section-title">Perfil: Cliente metódico y racional</div>Usa datos, no emociones. Estructura tus argumentos: "primero... segundo... tercero". Sé preciso con números. Evita jerga emocional.</div><div class="section"><div class="section-title">Señales</div><div class="proof">Pregunta "¿cómo funciona?" · Quiere detalles · Tono neutro · Pide documentación · Compara opciones</div></div><div class="warning">No digas "es increíble" o "todos lo aman". El analítico decide con datos, no con entusiasmo ajeno.</div>`,
    indeciso:`<div class="section"><div class="section-title">Perfil: Cliente dudoso e inseguro</div>Tú eres el guía. Toma la iniciativa siempre. Haz preguntas cerradas (sí/no, A o B). Nunca dejes silencio largo. Valida sus dudas: "es normal tener esa pregunta".</div><div class="section"><div class="section-title">Señales</div><div class="proof">"No sé..." · "Tendría que ver..." · Respuestas vagas · No toma decisiones · Pide tiempo</div></div><div class="warning">No le des muchas opciones — se paraliza. Elige por él: "Le marco mañana a las 10".</div>`
  }}
]},

// ═══ F2 CAPTAR EL DOLOR ═══
{id:2,name:"Captar el dolor",sub:"El anzuelo",timer:"1-2 min",mission:"Que el cliente confiese el problema. Tú preguntas, él habla.",
script:{
receptivo:`<span class="v">— [NOMBRE], te hago una pregunta directa y honesta:</span>
<span class="v">— Hoy en día, ¿cómo les llegan los clientes nuevos al negocio?</span>

<span class="c">👤 "Por recomendación" / "De boca en boca"</span>
<span class="r">→ O sea que dependen de que alguien los recomiende. ¿Y qué pasa los meses que no recomiendan tanto? ¿Baja el flujo?</span>

<span class="c">👤 "Sí, la verdad hay meses flojos"</span>
<span class="r">→ ¿Y esos meses flojos cuántos clientes dejan de entrar? ¿Estamos hablando de 5, 10, 15 menos?</span>

<span class="c">👤 "Tenemos redes sociales"</span>
<span class="r">→ ¿Y de esas redes cuántos clientes concretos les llegan al mes? No likes ni seguidores, sino personas que realmente agenden cita.</span>

<span class="c">👤 "La verdad no muchos" / "No lo tenemos medido"</span>
<span class="r">→ Ahí está el tema. Muchos negocios invierten en redes pero no saben cuántos clientes reales generan. ¿Le pasa algo similar?</span>

<span class="note">Tu trabajo aquí es ESCUCHAR. Mientras más hable el cliente, más información tienes para F3. Anota mentalmente los números que dé.</span>`,

esceptico:`<span class="v">— [NOMBRE], una consulta puntual:</span>
<span class="v">— ¿Actualmente tienen algún sistema estructurado para atraer clientes nuevos?</span>

<span class="c">👤 "Sí, tenemos marketing"</span>
<span class="r">→ ¿Y están satisfechos con los resultados? Específicamente, ¿saben cuántos clientes nuevos les genera al mes esa inversión?</span>

<span class="c">👤 "Más o menos" / "Podría ser mejor"</span>
<span class="r">→ ¿Qué parte no funciona como esperaban? ¿Es el volumen, la calidad del cliente, o la consistencia?</span>

<span class="c">👤 "Funcionamos con recomendación"</span>
<span class="r">→ La recomendación es excelente, pero tiene un problema: no se puede escalar ni predecir. ¿Han notado meses donde baja?</span>

<span class="note">El escéptico no va a "confesar" fácil. Haz preguntas concretas que lo lleven a darse cuenta solo. No asumas, pregunta.</span>`,

agresivo:`<span class="v">— [NOMBRE], directo:</span>
<span class="v">— ¿De dónde vienen sus clientes nuevos hoy?</span>

<span class="c">👤 "De varios lados" / "Recomendación"</span>
<span class="r">→ ¿Cuántos al mes, en promedio?</span>

<span class="c">👤 "[Número]" / "No lo tengo exacto"</span>
<span class="r">→ ¿Y ese número les alcanza para cubrir su capacidad o hay huecos en la agenda?</span>

<span class="c">👤 "Siempre hay huecos"</span>
<span class="r">→ ¿Cuántos huecos por semana, más o menos?</span>

<span class="note">Con el agresivo, preguntas cortas. Si te da un número, ÚSALO. "10 huecos a la semana × valor de consulta = dinero que pierde."</span>`,

analitico:`<span class="v">— [NOMBRE], me gustaría entender su operación actual:</span>
<span class="v">— ¿Qué canales de captación utilizan y cuál es el rendimiento de cada uno?</span>

<span class="c">👤 "Tenemos redes, algo de Google, y recomendación"</span>
<span class="r">→ De esos tres canales, ¿tiene medido cuántos clientes nuevos genera cada uno al mes?</span>

<span class="c">👤 "No exactamente"</span>
<span class="r">→ Ese es un punto clave. Sin esa métrica es imposible saber cuál canal optimizar y cuál eliminar. ¿Cuántos clientes nuevos entran en total al mes?</span>

<span class="c">👤 "[Número]"</span>
<span class="r">→ ¿Y cuál es su capacidad máxima de atención mensual? Porque la brecha entre los dos números es exactamente su oportunidad de crecimiento.</span>

<span class="note">Al analítico, llévalo con preguntas métricas. Él mismo va a descubrir el gap. Tú solo facilitas.</span>`,

indeciso:`<span class="v">— [NOMBRE], cuénteme un poco de su negocio:</span>
<span class="v">— ¿Cómo hacen para que les lleguen clientes nuevos? ¿Les llegan solitos o tienen que buscarlos?</span>

<span class="c">👤 "Pues... nos llegan por recomendación mayormente"</span>
<span class="r">→ Eso está bien. Pero déjeme preguntarle algo: ¿todos los meses les llegan los mismos o hay temporadas donde baja?</span>

<span class="c">👤 "Sí, hay meses más flojos"</span>
<span class="r">→ Y en esos meses flojos, ¿qué hacen? ¿Esperan a que se reactive solo o intentan algo?</span>

<span class="c">👤 "Pues esperamos, la verdad"</span>
<span class="r">→ Es lo que pasa en muchos negocios. El tema es que esperar es costoso: cada día sin clientes es dinero que no entra. ¿Ha pensado en tener algo que trabaje por usted?</span>

<span class="note">Guía cada paso. El indeciso no va a profundizar solo — tú debes ir llevándolo con preguntas suaves.</span>`
},
subdirs:[
  {label:"Cliente dice que está bien así",action:"No confrontes. Pregunta: '¿Cuántos clientes nuevos le gustaría tener vs cuántos tiene hoy?' Si hay diferencia, ahí está el dolor."},
  {label:"No da números concretos",action:"Reformula: 'Sin número exacto, ¿diría que son más de 10 o menos de 10 al mes? ¿Y cuántos podría atender si llegaran?' Contrasta la capacidad vs la realidad."},
  {label:"Quiere ir al grano",action:"Si presiona, haz el puente: 'Perfecto, lo que hacemos es justamente resolver eso. Pero para darle algo concreto, necesito entender un dato más...'"}
],
objections:[
  {title:"Ya tenemos suficientes clientes",popup:{
    receptivo:`<div class="section"><div class="section-title">Estrategia: No contradigas, profundiza</div>Si dice que tiene suficientes, no pelees. Acepta y busca el hueco.</div><div class="section"><div class="section-title">Argumento</div><div class="example">"Qué bien, me alegra escuchar eso. Solo una curiosidad: ¿están trabajando a capacidad máxima? Porque muchos negocios que dicen estar bien en realidad tienen un 30-40% de agenda libre que podrían llenar con clientes mejor calificados."</div></div><div class="section"><div class="section-title">Seguimiento</div><div class="example">"¿Y todos los que llegan son el tipo de cliente que usted quiere? Porque una cosa es tener clientes y otra es tener los clientes correctos, los que pagan bien y vuelven."</div></div><div class="proof">El 78% de negocios que dicen "tener suficientes" tienen al menos 25% de capacidad ociosa cuando se mide objetivamente.</div>`,
    esceptico:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Me alegra. Pregunta: ¿están al 100% de capacidad todos los días de la semana? Porque 'suficientes' y 'al máximo' son cosas distintas."</div></div><div class="proof">Llevar la conversación a datos concretos: ocupación real, días con huecos, variación mensual.</div>`,
    agresivo:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Perfecto. Entonces no le quito tiempo. Solo una pregunta: ¿todos los meses son iguales o hay variación? Porque si hay meses donde baja, ahí hay dinero que se pierde."</div></div>`,
    analitico:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Interesante. ¿Cuál es su tasa de ocupación promedio? En nuestra experiencia, negocios que reportan estar 'bien' suelen operar entre 65-75% de capacidad. La diferencia entre 75% y 95% puede representar [X] ingreso mensual adicional."</div></div>`,
    indeciso:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Qué bueno. Y dígame, ¿siempre ha sido así o hay temporadas donde baja un poco? Porque muchos negocios como el suyo nos dicen que hay 2-3 meses al año donde la cosa se pone lenta."</div></div>`
  }},
  {title:"No tengo tiempo para esto",popup:{
    receptivo:`<div class="section"><div class="section-title">Estrategia</div>No es que no tenga tiempo: es que no ve valor suficiente. Muestra el valor en una frase.</div><div class="section"><div class="section-title">Argumento</div><div class="example">"Totalmente entiendo. Le digo qué: si en los próximos 60 segundos lo que le cuento no le parece relevante, colgamos y no lo vuelvo a molestar. ¿Me da 60 segundos?"</div></div><div class="section"><div class="section-title">Si dice que sí (60 seg)</div><div class="example">"Trabajamos con negocios como el suyo y el promedio de nuestros clientes pasó de [X] a [Y] clientes nuevos al mes sin hacer nada manual. ¿Eso le interesaría o no?"</div></div><div class="proof">La técnica del "60 segundos" funciona porque reduce el riesgo percibido a casi cero.</div>`,
    esceptico:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Lo respeto. ¿Cuándo sería un buen momento para usted? Le aseguro que serán máximo 3 minutos y si no ve valor, no insisto."</div></div>`,
    agresivo:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Entendido. ¿Cuándo le queda? Porque esto puede representar [X] clientes más al mes para usted. Si no le sirve, 2 minutos perdidos. Si sí, le cambia el negocio."</div></div>`,
    analitico:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Comprendo. ¿Me permite agendar 5 minutos en su calendario esta semana? Le puedo adelantar que el tema es optimización de captación con ROI medible desde el mes 1."</div></div>`,
    indeciso:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Claro, no se preocupe. ¿Le marco mañana a las 10 de la mañana? Son solo 2 minutitos, y si no le parece, ahí lo dejamos. ¿Le parece mañana a las 10?"</div></div>`
  }},
  {title:"Ya tenemos marketing",popup:{
    receptivo:`<div class="section"><div class="section-title">Estrategia: Complementar, no reemplazar</div>No ataques su marketing actual. Posiciónate como complemento.</div><div class="section"><div class="section-title">Argumento</div><div class="example">"¡Genial! Eso habla bien de ustedes. Pregunta: ¿saben exactamente cuántos clientes nuevos les genera esa inversión cada mes? No hablo de alcance o likes, sino de personas que realmente agendaron y pagaron."</div></div><div class="section"><div class="section-title">Seguimiento clave</div><div class="example">"Porque lo que nosotros hacemos no reemplaza su marketing, lo potencia. Es como tener un vendedor más que trabaja 24/7 y usted solo ve los resultados."</div></div><div class="proof">El 82% de negocios que "tienen marketing" no pueden decir cuántos clientes concretos genera. Esa pregunta siempre abre la conversación.</div>`,
    esceptico:`<div class="section"><div class="section-title">Argumento</div><div class="example">"¿Y están satisfechos con el retorno? Porque muchos negocios invierten en marketing sin saber el costo real por cliente adquirido. ¿Tiene ese dato?"</div></div>`,
    agresivo:`<div class="section"><div class="section-title">Argumento</div><div class="example">"¿Cuántos clientes nuevos les genera al mes? Número concreto. Porque si no lo sabe, está invirtiendo a ciegas."</div></div>`,
    analitico:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Excelente. ¿Cuál es su CAC actual? ¿Y su tasa de conversión de lead a cliente? Porque ahí es donde podemos hacer una comparación objetiva."</div></div>`,
    indeciso:`<div class="section"><div class="section-title">Argumento</div><div class="example">"Qué bien que ya invierten. Y dígame, ¿sienten que les funciona bien o hay veces que no ven resultados claros? Porque eso es muy común y tiene solución."</div></div>`
  }},
  {title:"¿Esto es publicidad / venta?",popup:{
    receptivo:`<div class="section"><div class="section-title">Estrategia</div>Reclasifica tu llamada. No eres vendedor, eres consultor haciendo un diagnóstico.</div><div class="section"><div class="section-title">Argumento</div><div class="example">"No, para nada. Mire, le explico: nosotros trabajamos con negocios de [RUBRO] y lo que hacemos primero es un diagnóstico gratuito. Si encontramos una oportunidad se la mostramos, si no, le decimos directamente. No hay compromiso. ¿Me permite hacerle una pregunta?"</div></div><div class="proof">La palabra "diagnóstico" cambia la percepción. No es venta, es evaluación profesional.</div>`,
    esceptico:`<div class="section"><div class="section-title">Argumento</div><div class="example">"No. Es una evaluación sin costo de su proceso de captación. Si no hay oportunidad de mejora, se lo digo y no insisto. ¿Me permite una pregunta?"</div></div>`,
    agresivo:`<div class="section"><div class="section-title">Argumento</div><div class="example">"No. Es un análisis. Si no le sirve, le digo directo y no le quito más tiempo. ¿Me da 60 segundos?"</div></div>`,

<span class="v">— Si cada consulta vale $[Z], estamos hablando de $[Z×(Y-X)] que podría estar facturando y no está entrando.</span>

<span class="c">👤 "Sí, nunca lo había visto así"</span>
<span class="r">→ Y eso es solo un mes. En un año son $[anual]. Es como tener un empleado que cobra pero no produce. ¿No le gustaría cerrar esa brecha?</span>

<span class="c">👤 "Pero no todos los espacios se van a llenar"</span>
<span class="r">→ Claro, tampoco digo el 100%. Pero si llenáramos la mitad, ¿ya vale la pena? Estamos hablando de $[mitad] al mes extra.</span>

<span class="note">USA SUS NÚMEROS. No inventes. Si dijo "10 clientes al mes" y puede atender 30, ahí está el dolor: 20 espacios vacíos × precio de consulta.</span>`,

esceptico:`<span class="v">— [NOMBRE], hagamos un ejercicio rápido con sus propios números:</span>
<span class="v">— Usted me dijo que entran [X] clientes al mes. Su capacidad es [Y]. ¿Correcto?</span>
<span class="v">— La diferencia son [Y-X] espacios vacíos. A $[Z] por consulta, eso es $[resultado] mensual en ingreso no realizado.</span>

<span class="c">👤 "Sí, pero la realidad es más compleja"</span>
<span class="r">→ Tiene razón, hay variables. Pero incluso si tomamos el escenario más conservador y solo llenamos un 30% de esos espacios, son $[30%] al mes extra. ¿Eso sería significativo?</span>

<span class="note">Con el escéptico, usa escenarios conservadores. Si dices "el 100%", no te cree. Dile "el 30% más conservador" y le parece más real.</span>`,

agresivo:`<span class="v">— [NOMBRE], los números:</span>
<span class="v">— [X] clientes al mes. Capacidad para [Y]. Son [Y-X] huecos.</span>
<span class="v">— A $[Z] cada uno: $[total] al mes que no están entrando.</span>

<span class="c">👤 "¿Y ustedes qué proponen?"</span>
<span class="r">→ Le cuento en un momento. Pero primero: ¿está de acuerdo con que hay oportunidad de crecimiento aquí? Porque si la respuesta es sí, tengo algo concreto.</span>

<span class="note">El agresivo quiere acción, no análisis largo. Presenta números rápido y pasa a la pregunta de cierre de fase.</span>`,

analitico:`<span class="v">— [NOMBRE], permítame presentarle un análisis basado en sus datos:</span>
<span class="v">— Captación actual: [X]/mes · Capacidad: [Y]/mes · Gap: [Y-X]/mes</span>
<span class="v">— Ticket promedio: $[Z] · Ingreso no realizado: $[Z×gap]/mes · Proyección anual: $[anual]</span>

<span class="c">👤 "Esos números son correctos, pero ¿cómo proponen cerrar ese gap?"</span>
<span class="r">→ Con un sistema que tiene un costo de adquisición por cliente de $[CAC], lo que significa un ROI de [X]x. Le muestro cómo funciona.</span>

<span class="note">El analítico ama las tablas y las proyecciones. Dale estructura numérica y déjalo que procese. Él mismo llega a la conclusión.</span>`,

indeciso:`<span class="v">— [NOMBRE], le hago ver algo que quizá no había notado:</span>
<span class="v">— Usted me dijo que atiende unos [X] clientes al mes, pero podría atender [Y].</span>
<span class="v">— Eso son [Y-X] clientes que podrían estar pagando cada mes y no están llegando.</span>
<span class="v">— ¿Se imagina cuánto representan al año? Es como tirar dinero a la basura sin darse cuenta.</span>

<span class="c">👤 "Sí... nunca lo había pensado así"</span>
<span class="r">→ Es normal, le pasa a muchos. La buena noticia es que tiene solución. ¿Le gustaría saber cómo?</span>

<span class="note">Con el indeciso, el dolor debe generar urgencia PERO también esperanza inmediata. "Tiene solución" es clave.</span>`
},

  {title:"No se puede predecir la demanda",popup:{receptivo:`<div class="section"><div class="example">"Tiene razón, no se puede predecir. Pero sí se puede generar. La diferencia entre esperar que lleguen y tener un sistema que los traiga, es la diferencia entre dejar el negocio al azar y controlarlo. ¿No preferiría controlarlo?"</div></div><div class="proof">Los negocios con sistema activo de captación tienen 40% menos variación mensual que los que dependen de recomendación.</div>`,esceptico:`<div class="section"><div class="example">"Coincido, la demanda fluctúa. Pero se puede estabilizar con un canal constante. Lo que no se puede es depender de variables que no controla."</div></div>`,agresivo:`<div class="section"><div class="example">"No se predice, se genera. ¿Quiere seguir esperando o quiere un sistema que produzca?"</div></div>`,analitico:`<div class="section"><div class="example">"Estadísticamente, la variabilidad se reduce con múltiples canales de adquisición. Un canal automatizado reduce la desviación estándar de ingresos mensuales en aproximadamente 35%."</div></div>`,indeciso:`<div class="section"><div class="example">"Es verdad que no se puede predecir. Pero hay formas de tener un flujo más constante para que no dependa de la suerte. ¿Eso le interesaría?"</div></div>`}},

  {title:"Eso suena muy bonito en teoría",popup:{receptivo:`<div class="section"><div class="example">"Tiene razón en ser precavido. Por eso no le pido que confíe en la teoría: le pido 15 minutos para mostrarle cómo funciona con datos de su propio negocio. Si no le cuadra, no perdió más que 15 minutos."</div></div><div class="proof">Oferta de demostración personalizada: reduce la objeción "teórica" porque lo convierte en práctico y específico.</div>`,esceptico:`<div class="section"><div class="example">"Entiendo su postura. No le voy a dar teoría. Le puedo mostrar datos reales de negocios similares al suyo: nombres, números, resultados. ¿Eso le daría más confianza?"</div></div>`,agresivo:`<div class="section"><div class="example">"No es teoría. Tengo números de clínicas reales. ¿Quiere verlos o no?"</div></div>`,analitico:`<div class="section"><div class="example">"Más que teoría, le puedo presentar evidencia empírica: casos documentados, métricas de rendimiento y ROI verificable. ¿Le envío el reporte?"</div></div>`,indeciso:`<div class="section"><div class="example">"Es normal sentir eso. Muchos lo sintieron igual. ¿Qué le parece si le muestro un caso real parecido al suyo? Así ve con sus propios ojos."</div></div>`}}

{id:4,name:"Presentar la solución",sub:"Vende el resultado",timer:"1.5 min",mission:"Vende el resultado, nunca la tecnología. El cliente quiere más clientes, no un bot.",
script:{
receptivo:`<span class="v">— [NOMBRE], lo que hacemos es esto:</span>
<span class="v">— Instalamos un sistema que hace que clientes nuevos le escriban a usted directamente por WhatsApp, listos para agendar cita.</span>
<span class="v">— Usted no tiene que hacer nada. Solo recibe el mensaje de un cliente que ya quiere ir.</span>
<span class="v">— Es como tener un vendedor que trabaja 24/7, no cobra sueldo, y solo le pasa clientes calificados.</span>

<span class="c">👤 "¿Pero cómo funciona exactamente?"</span>
<span class="r">→ Se lo explico simple: nosotros atraemos a personas que buscan [SERVICIO] en su zona. Esas personas llegan a una conversación automatizada que las califica y les agenda cita directamente en su agenda. Usted solo llega a atender.</span>

<span class="note">NUNCA digas "bot" ni "automatización" a menos que pregunten directamente. Vende el resultado: "clientes nuevos que le escriben listos para agendar".</span>`,
esceptico:`<span class="v">— [NOMBRE], le explico sin rodeos:</span>
<span class="v">— Tenemos un sistema que genera clientes nuevos para negocios como el suyo a través de WhatsApp.</span>
<span class="v">— El cliente llega ya interesado, ya calificado, y listo para agendar.</span>
<span class="v">— No requiere esfuerzo suyo. El sistema trabaja solo y usted solo ve los resultados.</span>

<span class="c">👤 "¿Qué garantía tengo?"</span>
<span class="r">→ Le puedo mostrar casos reales de negocios similares con números verificables. Sin humo, sin promesas abstractas. Datos.</span>

<span class="note">El escéptico quiere pruebas, no promesas. Ofrece mostrar, no decir.</span>`,
agresivo:`<span class="v">— [NOMBRE], simple:</span>
<span class="v">— Le generamos clientes nuevos por WhatsApp. Llegan calificados, agendan solos.</span>
<span class="v">— Usted no hace nada. Solo atiende las citas.</span>
<span class="v">— Los negocios como el suyo ven resultados en las primeras 2 semanas.</span>

<span class="r">→ Costo por lead, tasa de calificación, tasa de agendamiento, costo por paciente adquirido, y ROI mensual. Todo en un dashboard en tiempo real.</span>

<span class="note">Al analítico dale estructura y datos. Le encanta ver el proceso desglosado.</span>`,
indeciso:`<span class="v">— [NOMBRE], se lo pongo bien sencillo:</span>
<span class="v">— Nosotros nos encargamos de que le lleguen clientes nuevos por WhatsApp.</span>
<span class="v">— El cliente le escribe ya interesado, ya calificado, listo para agendar.</span>

<span class="note">El indeciso teme la complejidad. Simplifica al máximo. "Es como recibir un WhatsApp" elimina el miedo.</span>`
},

  {title:"Es muy caro / No tengo presupuesto",popup:{receptivo:`<div class="section"><div class="section-title">Ancla al costo de NO hacer nada</div><div class="example">"Entiendo. Pero permítame ponerlo en perspectiva: ¿cuánto le cuesta un mes sin esos clientes? Si pierde $[X] al mes en capacidad ociosa, la inversión no es un gasto, es la solución al gasto que YA tiene."</div></div><div class="section"><div class="section-title">Técnica: fraccionamiento</div><div class="example">"Veámoslo así: la inversión dividida entre 30 días es $[diario]. ¿Invertiría $[diario] al día para recibir [X] clientes nuevos al mes? Es menos que una comida."</div></div><div class="proof">El costo de inacción siempre es mayor que el costo de acción. Haz que el cliente vea que YA está pagando — con dinero que no entra.</div>`,esceptico:`<div class="section"><div class="example">"¿Caro comparado con qué? ¿Con lo que pierde cada mes en capacidad ociosa? Le propongo algo: revisemos los números juntos en 15 minutos. Si el ROI no cuadra, yo mismo le digo que no lo haga."</div></div>`,agresivo:`<div class="section"><div class="example">"¿Cuánto pierde al mes por los huecos en agenda? Eso sí es caro. Esto se paga con 2 clientes. Haga la cuenta."</div></div>`,analitico:`<div class="section"><div class="example">"Hagamos el ejercicio: inversión mensual / clientes generados = costo por adquisición. Compare ese CAC con el lifetime value de cada cliente. Le anticipo que el ratio es favorable."</div></div>`,indeciso:`<div class="section"><div class="example">"Entiendo que es una inversión importante. ¿Sabe qué hacemos? Empezamos con un plan básico que se ajusta a cualquier presupuesto. Y con los primeros clientes que lleguen, ya se cubrió. ¿Le parece?"</div></div>`}},
  {title:"Necesito pensarlo / consultarlo",popup:{receptivo:`<div class="section"><div class="section-title">Estrategia: No dejes enfriar</div><div class="example">"¡Por supuesto! Solo para que lo piense con toda la información: ¿qué tal si hacemos una sesión de 15 minutos donde le muestro el sistema funcionando? Así tiene toda la info para decidir con su socio/esposa/contador. ¿Mañana en la mañana o en la tarde?"</div></div><div class="proof">Pensar sin información = olvidar. Pensar con información = decidir. Siempre ofrece dar MÁS info, no menos.</div>`,esceptico:`<div class="section"><div class="example">"Lo respeto. ¿Qué información adicional le ayudaría a tomar la decisión? Se la puedo preparar para que la revise con calma."</div></div>`,agresivo:`<div class="section"><div class="example">"Entendido. ¿Cuándo tiene respuesta? Porque esta oportunidad tiene vigencia. ¿Le llamo el jueves?"</div></div>`,analitico:`<div class="section"><div class="example">"Comprendo. ¿Le sería útil que le envíe un documento con proyección financiera personalizada? Así tiene datos duros para la toma de decisión."</div></div>`,indeciso:`<div class="section"><div class="example">"Claro, sin presión. ¿Le parece si le mando un resumen y hablamos el jueves? Así lo piensa tranquilo. ¿Jueves a las 10 o a las 3?"</div></div>`}},
  {title:"No confío en este tipo de servicios",popup:{receptivo:`<div class="section"><div class="example">"Lo entiendo, hay mucho humo en el mercado. Por eso le propongo algo concreto: le muestro el sistema funcionando en vivo, con datos reales de negocios como el suyo. Usted ve y decide. Sin presión, sin compromiso."</div></div><div class="proof">La confianza no se pide, se demuestra. Demo en vivo > cualquier promesa verbal.</div>`,esceptico:`<div class="section"><div class="example">"Es una postura prudente. Le puedo compartir referencias de clientes actuales que usted puede contactar directamente. ¿Eso le daría más confianza?"</div></div>`,agresivo:`<div class="section"><div class="example">"Respeto eso. Pero la desconfianza se cura con datos, no con palabras. ¿Le muestro números reales o no?"</div></div>`,analitico:`<div class="section"><div class="example">"Comprensible. ¿Le ayudaría revisar: (a) casos de estudio documentados, (b) métricas de rendimiento auditables, y (c) referencias directas de clientes actuales?"</div></div>`,indeciso:`<div class="section"><div class="example">"Es totalmente normal sentir eso. Le cuento que muchos clientes nuestros empezaron con la misma duda. ¿Qué le daría más tranquilidad? ¿Ver un caso real? ¿Hablar con alguien que ya lo usa?"</div></div>`}},
  {title:"Otro me ofrece algo similar más barato",popup:{receptivo:`<div class="section"><div class="example">"¡Qué bueno que está comparando! La diferencia está en el acompañamiento y los resultados. Le pregunto: ¿ellos le garantizan un proceso de optimización continua? ¿Le dan métricas en tiempo real? ¿Tiene un consultor dedicado?"</div></div><div class="section"><div class="section-title">Diferenciadores clave</div><div class="proof">Setup completo sin esfuerzo suyo · Optimización semanal · Dashboard en tiempo real · Consultor dedicado · Resultados medibles desde mes 1</div></div>`,esceptico:`<div class="section"><div class="example">"¿Qué incluye exactamente su propuesta? Porque barato sin resultados es caro. Le puedo hacer un comparativo punto por punto si me comparte los detalles."</div></div>`,agresivo:`<div class="section"><div class="example">"¿Más barato? ¿Y qué resultados le prometen? Porque el precio más bajo con cero resultados es el precio más caro que existe."</div></div>`,analitico:`<div class="section"><div class="example">"Interesante. ¿Me puede compartir el desglose de su oferta? Puedo preparar un comparativo técnico: alcance, métricas incluidas, nivel de optimización, y sobre todo, resultados comprobables."</div></div>`,indeciso:`<div class="section"><div class="example">"Qué bueno que está viendo opciones. ¿Quiere que le ayude a comparar? Sin compromiso. Le digo honestamente si la otra opción es mejor para usted."</div></div>`}}
]},

objections:[
  {title:"Mándame info primero",popup:{receptivo:`<div class="section"><div class="example">"¡Claro! Le mando un resumen ahora mismo. Pero le digo algo: en 15 minutos le puedo explicar mucho mejor que cualquier PDF. ¿Qué tal si le mando la info Y agendamos la sesión? Así tiene la info para revisarla y en la sesión resolvemos dudas. ¿Mañana o pasado?"</div></div><div class="proof">Técnica: vincular. No es "info O sesión", es "info Y sesión".</div>`,esceptico:`<div class="section"><div class="example">"Con gusto. ¿A qué WhatsApp se lo envío? Le incluyo casos de estudio y métricas. Y si después de revisarlo quiere profundizar, agendamos 15 minutos. ¿Le parece?"</div></div>`,agresivo:`<div class="section"><div class="example">"Se la mando ahora. ¿Número de WhatsApp? Pero le anticipo: la info real está en la demo. ¿La vemos mañana?"</div></div>`,analitico:`<div class="section"><div class="example">"Le preparo un documento con: casos de estudio, métricas de rendimiento, y una proyección preliminar para su caso. ¿A qué correo? Y para el análisis detallado, ¿agendamos una sesión de 15 minutos?"</div></div>`,indeciso:`<div class="section"><div class="example">"Sí, se la mando. ¿Me da su WhatsApp? Y le agendo una llamadita corta para la semana que viene, así si le surgen dudas las resolvemos. ¿El martes le queda?"</div></div>`}},
  {title:"Tengo que hablar con mi socio",popup:{receptivo:`<div class="section"><div class="example">"¡Perfecto! ¿Y si hacemos la sesión con los dos? Así ambos tienen la misma información y pueden decidir juntos. ¿Cuándo pueden ambos?"</div></div><div class="proof">Incluir al socio en la sesión es MEJOR que dejarlo afuera. Evita el teléfono roto.</div>`,esceptico:`<div class="section"><div class="example">"Comprendo. ¿Le parece si agendamos una sesión con ambos presentes? Así la información llega completa y pueden evaluar juntos."</div></div>`,agresivo:`<div class="section"><div class="example">"Bien. Agenda con tu socio. ¿Cuándo pueden los dos? Lo hacemos en 15 minutos."</div></div>`,analitico:`<div class="section"><div class="example">"Lógico. ¿Le preparo material para que comparta? Y agendamos sesión conjunta para abordar preguntas de ambos. ¿Qué día funcionaría?"</div></div>`,indeciso:`<div class="section"><div class="example">"Claro, es importante que estén de acuerdo. ¿Me dice cuándo pueden los dos y lo agendamos? Así se enteran juntos y nadie se queda con dudas."</div></div>`}},
  {title:"No estoy convencido aún",popup:{receptivo:`<div class="section"><div class="example">"Lo entiendo. ¿Qué parte le genera duda? Porque quizás puedo resolverla ahora. Y si no, la sesión de 15 minutos es justamente para eso: que vea todo y decida con información completa."</div></div>`,esceptico:`<div class="section"><div class="example">"Respeto eso. ¿Qué necesitaría ver para estar convencido? Datos, testimonios, demo en vivo... dígame y se lo preparo."</div></div>`,agresivo:`<div class="section"><div class="example">"¿Qué necesitas para decidir? Dime y te lo doy ahora."</div></div>`,analitico:`<div class="section"><div class="example">"¿Qué variable le falta para completar su evaluación? Puedo proporcionarle datos adicionales o un análisis específico."</div></div>`,indeciso:`<div class="section"><div class="example">"Es normal no estar convencido todavía. La sesión de 15 minutos es sin compromiso, justamente para resolver esas dudas. Si después no le convence, no pasa nada. ¿Le parece mañana?"</div></div>`}},
  {title:"No estoy interesado",popup:{receptivo:`<div class="section"><div class="section-title">No es no, pero merece una pregunta final</div><div class="example">"Lo respeto completamente. Solo una última pregunta: ¿no le interesa porque ya tiene algo que funciona, o porque no es el momento? Porque si es el momento, le puedo llamar cuando sea más oportuno."</div></div><div class="proof">Esta pregunta clasifica: si tiene algo, es un no real. Si es momento, es un seguimiento.</div>`,esceptico:`<div class="section"><div class="example">"Entiendo. ¿Me permite preguntar qué parte no le pareció relevante? Me ayuda a mejorar."</div></div>`,agresivo:`<div class="section"><div class="example">"OK. ¿Es por el servicio o por el momento?"</div></div>`,analitico:`<div class="section"><div class="example">"Comprendo. ¿Podría indicarme qué factor fue determinante? Es información valiosa."</div></div>`,indeciso:`<div class="section"><div class="example">"Claro, sin problema. Y si en algún momento le surge la curiosidad, ¿puedo dejarle mi número por si acaso?"</div></div>`}}
]},

  {title:"Ya cambié de opinión",popup:{receptivo:`<div class="section"><div class="example">"Entiendo. ¿Hay algo que le hizo cambiar de parecer? A veces una duda sin resolver causa eso. Si es algo que puedo aclarar, con gusto."</div></div><div class="warning">Si insiste en que no, respeta. Cierra con: "Sin problema [NOMBRE], que le vaya bien. Aquí estamos si necesita."</div>`,esceptico:`<div class="section"><div class="example">"Comprendo. ¿Fue algún punto específico? Me ayuda a saber si hay algo que no expliqué bien."</div></div>`,agresivo:`<div class="section"><div class="example">"OK. ¿Es por algo específico? Si no, respeto. Gracias por su tiempo."</div></div>`,analitico:`<div class="section"><div class="example">"¿Fue algún factor que no abordamos? Porque si hay información pendiente, puedo resolverla ahora."</div></div>`,indeciso:`<div class="section"><div class="example">"Entiendo. Mire, no hay presión. Si en algún momento quiere retomarlo, me escribe y lo vemos con calma. ¿Le dejo mi número?"</div></div>`}},

let cp=0,am="receptivo",ec=null;
const gc=()=>M.find(m=>m.id===am).color;
const gm=()=>M.find(m=>m.id===am);

function rMood(){document.getElementById('moodBar').innerHTML=M.map(m=>{const a=m.id===am;return`<button class="mood-btn${a?' active':''}"onclick="setM('${m.id}')"style="background:${a?m.color+'12':''};border-color:${a?m.color+'44':''}"><span class="mood-emoji">${m.emoji}</span>${a?`<span class="mood-label"style="color:${m.color}">${m.label}</span>`:''}</button>`}).join('')}

function rPhase(){const p=P[cp],c=gc();document.getElementById('phaseDots').innerHTML=P.map((_,i)=>{if(i===cp)return`<div class="pdot on"style="background:linear-gradient(90deg,${c},${c}88)"></div>`;if(i<cp)return`<div class="pdot done"style="background:${c}44"></div>`;return`<div class="pdot off"></div>`}).join('');document.getElementById('ptag').textContent=`F${p.id}`;document.getElementById('ptag').style.color=c;document.getElementById('pname').textContent=p.name;document.getElementById('psub').textContent=p.sub;document.getElementById('ptimer').textContent=p.timer;document.getElementById('pmission').textContent=p.mission}

function rCards(){const p=P[cp];document.getElementById('leftCol').innerHTML=p.objections.slice(0,2).map((o,i)=>`<div class="ocard"onclick="openPop(${i})"><div class="tline"></div><span class="otag">Objeción</span><span class="otitle">${o.title}</span><span class="ohint">Toca para ver argumento completo</span></div>`).join('');document.getElementById('rightCol').innerHTML=p.objections.slice(2,4).map((o,i)=>`<div class="ocard"onclick="openPop(${i+2})"><div class="tline"></div><span class="otag">Objeción</span><span class="otitle">${o.title}</span><span class="ohint">Toca para ver argumento completo</span></div>`).join('')}

function rCenter(){const p=P[cp],m=gm();document.getElementById('bmoodText').textContent=`${m.emoji} ${m.label.toUpperCase()}`;let h=`<div class="stxt">${p.script[am]}</div>`;
if(p.hasForm){h+=`<div class="form-area"><div class="form-title">📋 Datos del Cliente</div>${[{k:'nombre',l:'Nombre completo',p:'Ej: Dr. García'},{k:'negocio',l:'Negocio / Clínica',p:'Ej: Clínica Dental Sonríe'},{k:'telefono',l:'Teléfono / WhatsApp',p:'+52 55 1234 5678'},{k:'horario',l:'Día y hora',p:'Ej: Martes 10am'},{k:'formato',l:'Formato',p:'Videollamada / Llamada'},{k:'notas',l:'Notas',p:'Observaciones...'}].map(f=>`<div class="fgrp"><label>${f.l}</label><input placeholder="${f.p}"id="f_${f.k}"></div>`).join('')}<button class="fbtn"onclick="save()">✓ Confirmar cita</button></div>`}
h+=`<div class="subdirs"><div class="subdirs-title">↳ Redireccionamientos</div>${p.subdirs.map((s,i)=>`<button class="subdir-btn"onclick="openSub(${i})">${s.label}</button>`).join('')}</div>`;
document.getElementById('scriptArea').innerHTML=h}

function rNav(){const p=P[cp],c=gc();document.getElementById('ncur').textContent=p.id;document.getElementById('btnP').disabled=cp===0;const n=document.getElementById('btnN');n.disabled=cp===6;n.style.background=cp===6?'':c+'12';n.style.borderColor=cp===6?'':c+'33';n.style.color=cp===6?'#c5c9d4':c}

function render(){rMood();rPhase();rCards();rCenter();rNav()}
function setM(id){am=id;ec=null;render()}
function go(d){document.getElementById('main').classList.add('hide');ec=null;setTimeout(()=>{cp=Math.max(0,Math.min(6,cp+d));render();document.getElementById('main').classList.remove('hide')},300)}

function openPop(idx){const p=P[cp],o=p.objections[idx],m=gm(),c=gc();document.getElementById('popTag').textContent='Objeción — F'+p.id+' '+p.name;document.getElementById('popTitle').textContent=o.title;document.getElementById('popMood').innerHTML=`Modo: ${m.emoji} ${m.label}`;document.getElementById('popMood').style.color=c;document.getElementById('popBody').innerHTML=o.popup[am];document.getElementById('popover').classList.add('show');document.body.style.overflow='hidden'}
function openSub(idx){const s=P[cp].subdirs[idx],m=gm(),c=gc();document.getElementById('popTag').textContent='Redirección — F'+P[cp].id;document.getElementById('popTitle').textContent=s.label;document.getElementById('popMood').innerHTML=`Modo: ${m.emoji} ${m.label}`;document.getElementById('popMood').style.color=c;document.getElementById('popBody').innerHTML=`<div class="section"><div class="section-title">Qué hacer</div><p>${s.action}</p></div>`;document.getElementById('popover').classList.add('show');document.body.style.overflow='hidden'}
function closePopup(e){if(e&&e.target!==document.getElementById('popover'))return;document.getElementById('popover').classList.remove('show');document.body.style.overflow=''}
function save(){const d={};['nombre','negocio','telefono','horario','formato','notas'].forEach(k=>{const e=document.getElementById('f_'+k);if(e)d[k]=e.value});alert('✅ Cita confirmada:\n'+JSON.stringify(d,null,2))}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup()});
render();
</script>
</body>
</html>
